NAME="Cursor"
FORGE="direct"
APPIMG_NAME="Cursor"
# Cursors updater is flaky; use downloader.cursor.sh directly
# Version extracted from the downloaded file's --version or filename
DIRECT_URL="https://downloader.cursor.sh/linux/appImage/x64"
DIRECT_VERSION_CMD='curl -sL "%s" -o /dev/null -w "%{url_effective}" 2>/dev/null | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -n1'
# The downloader.cursor.sh URL always returns the latest; we detect version
# from the cached file name after download, comparing against installed.
# Strategy: download to cache with a temp name, compare with installed version
# (parsed from installed filename), install if different, then create -latest symlink.
# For version detection, run: ./Cursor-*.AppImage --version 2>/dev/null | head -1
# Asset name in cache will be inferred from Content-Disposition header or URL
