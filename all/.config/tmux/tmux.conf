# ~/.config/tmux/tmux.conf
# LainCore -- auto-generated by style.org emit-tmux
# Do NOT edit directly; edit style.org or term.org instead.

set -g status-style "bg=#454545,fg=#d2d4d4"
set -g status-left "#[bg=#cb4b16,fg=#ffffff,bold] #S #[bg=#454545,fg=#cb4b16]"
set -g status-right "#[fg=#b58900]#[bg=#b58900,fg=#ffffff] #H "
setw -g window-status-format "#[fg=#d2d4d4,bg=#454545] #I #W "
setw -g window-status-current-format "#[fg=#ffffff,bg=#242424,bold] #I #W "
set -g pane-border-style "fg=#454545"
set -g pane-active-border-style "fg=#268bd2"
set -g message-style "bg=#b58900,fg=#1f1f1f"
set -g message-command-style "bg=#454545,fg=#d2d4d4"
setw -g clock-mode-colour "#268bd2"

# Non-theme settings (keybindings, plugins, resurrection)
source-file ~/DotCortex/all/.config/tmux/behavior.conf
