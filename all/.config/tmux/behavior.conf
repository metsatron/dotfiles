# ~/.config/tmux/behavior.conf
# Non-theme settings -- sourced from tmux.conf (emitted by style.org)

# --- Basics ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-kitty:Tc,wezterm:Tc"
set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g escape-time 0
set -g set-clipboard on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# --- Prefix ---
set -g prefix C-a
bind C-a send-prefix

# Secondary prefix (nested sessions)
set -g prefix2 C-b
bind C-b send-prefix -2

# --- Vi mode ---
setw -g mode-keys vi
set -g status-keys vi

# Vi-style copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# --- Window/Pane management ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"
bind w confirm-before -p "kill window #W? (y/n)" kill-window

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r PPage previous-window
bind -r NPage next-window

# Swap windows
bind -r S-PPage swap-window -d -t -1
bind -r S-NPage swap-window -d -t +1

# Window picker / clock
bind Tab choose-tree
bind C-c clock-mode

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# --- Status bar position ---
set -g status-position top
set -g status-justify left
set -g status-left-length 50
set -g status-right-length 80

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# --- Resurrect settings ---
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-processes 'ssh btop htop nvim vim man less tail top watch claude opencode'
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @resurrect-hook-post-restore-all 'run-shell ~/.config/tmux/resurrect-post-restore.sh'

# --- Continuum settings ---
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @continuum-status-on 'on'

# --- Initialize TPM (keep at bottom) ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
run '~/.config/tmux/plugins/tpm/tpm'
