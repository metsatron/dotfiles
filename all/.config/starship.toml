# Use our file, make repo checks snappier
command_timeout = 5000
scan_timeout = 50
add_newline = false

# Powerline layout
format = """
[ŅéČ](color_orange)\
$os$username\
[Ņé░](bg:color_yellow fg:color_orange)\
$directory\
[Ņé░](fg:color_yellow bg:color_blue)\
$git_branch$git_status\
[Ņé░](fg:color_blue bg:color_cyan)\
$c$rust$golang$nodejs$php$java$kotlin$haskell$python\
[Ņé░](fg:color_cyan bg:color_bg3)\
$docker_context$conda$pixi\
[Ņé░](fg:color_bg3 bg:color_bg1)\
$time\
[Ņé┤ ](fg:color_bg1)\
$line_break$character"""

palette = "dream_solar"

[palettes.dream_solar]
# color_fg0   = "#d2d4d4"  # base05
color_fg0   = "#ffffff"  # base05
color_bg1   = "#383838"  # base01
color_bg3   = "#515151"  # base02
color_cyan  = "#4b6983"  # base0C
color_blue  = "#268bd2"  # base0D
color_green = "#4caf50"  # base0B
color_orange= "#cb4b16"  # base09
color_purple= "#a681d6"  # base0E
color_red   = "#dc322f"  # base08
color_yellow= "#b58900"  # base0A

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"
[os.symbols]
