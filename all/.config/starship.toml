# IMPORTANT: module name is lowercase and uses style_user/style_root
[username]
show_always = true
style_user  = "bg:color_orange fg:color_fg0"
style_root  = "bg:color_orange fg:color_fg0"
format = "[ $user ]($style)"

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"
[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music"     = "¾░ØÜ "
"Pictures"  = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style  = "bg:color_blue"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_blue)]($style)'

[git_status]
style  = "bg:color_blue"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_blue)]($style)'
# If a repo is still painfully slow, temporarily uncomment:
disabled = true

[git_metrics]
disabled = true

[git_commit]
only_detached = false
tag_disabled = true
commit_hash_length = 7

[nodejs]
symbol = "Ņ£ś"
style  = "bg:color_cyan"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_cyan)]($style)'

[c]
symbol = "ŅśØ "                # C++ glyph if you like
detect_extensions = ["c","h","cpp","hpp","cc","hh","cxx","hxx"]
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "Ņ×©"
style  = "bg:color_cyan"
