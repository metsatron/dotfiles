# See this wiki page for more info:
# https://github.com/dylanaraps/neofetch/wiki/Customizing-Info
#
# info suports from ${c1} to ${c6} and do not support $(color n) syntax, use 'ascii_colors' color order
# prin supports from $(color 1) to ${color 16} and do not support ${cn} syntax
#
# Based on :
#	https://github.com/chick2d/neofetch-themes/blob/main/normal/acenoster.conf

# This config file make use of some glyphs that are not available in the 
# Nerd Fonts package, not until certain PR is merged: https://cutt.ly/nwhpIEXj

# --- terminal font fallback (env вҶ’ env вҶ’ fc-match) ---
if [[ -z ${term_font-} ]]; then
  if [[ -n ${TERM_FONT-} ]]; then
    term_font="$TERM_FONT"
  elif [[ -n ${WEZTERM_FONT-} ]]; then
    term_font="$WEZTERM_FONT"
  elif command -v fc-match >/dev/null 2>&1; then
    term_font="$(fc-match -f '%{family}\n' 2>/dev/null | head -n1)"
  fi
fi

# Decorator for colors
# dec="п…ј \n \n" # Tux
# dec="у°®” \n \n" # nf-md-eye_circle
# dec="у°ҲҲ \n \n" # nf-md-eye
dec="у°Ў® \n \n" # nf-md-eye_settings_outline
# dec="у°ҲҲу°ҫЎоҷі \n \n" # nf-md-eye
# dec="пҚһ \n \n" # Accela at <U+F35E>

print_info() {
	# Colors from c1 to c6
	info "${c1}гғӣгӮ№гғҲ" title
	prin
	info "${c6} в•ӯв”ҖпҢҘ " distro # Copland logo at <U+F35F>
	info "${c6} в”ңв”Җп…ј " kernel
	# info "${c6} в”ңв”ҖпҖҮ " users
	info "${c6} в”ңв”Җу°®Ҝ " packages
	# info "${c6} в”ңв”Җу°Ҡ  " packages
	info "${c6} в•°в”Җп’ү " shell
	prin
	# info "${c4} в•ӯв”ҖпӢҗ " de
	info "${c4} в•ӯв”ҖпҚҗ " de
	info "${c4} в”ңв”ҖоӘ… " term
	info "${c4} в”ңв”ҖпҖұ " term_font
	info "${c4} в”ңв”Җу°үј " theme
	info "${c4} в”ңв”Җу°Җ» " icons
	info "${c4} в•°в”ҖпҖұ " font # Font of LainOS, check GTK settings
	prin
	info "${c5} в•ӯв”Җп„ү " model
	info "${c5} в”ңв”Җу°Қӣ " cpu
	info "${c5} в”ңв”Җу°ҳҡ " gpu
	# info "${c5} в”ңв”ҖпӮ… " gpu_driver
	info "${c5} в”ңв”ҖпҖҫ " resolution
	info "${c5} в”ңв”ҖпӢӣ " memory
	# info "${c5} в”ңв”ҖпӮ  ${c2}" disk
	# info "${c5} в”ңв”ҖуұҲ‘ ${c2}" battery
	info "${c5} в•°в”Җу°…җ " uptime
	prin
	prin " \n $(color 1)$dec$(color 2)$dec$(color 3)$dec$(color 4)$dec$(color 5)$dec$(color 6)$dec$(color 7)$dec$(color 8)$dec \n \n $(color 9)$dec$(color 10)$dec$(color 11)$dec$(color 12)$dec$(color 13)$dec$(color 14)$dec$(color 15)$dec$(color 16)$dec"
}

