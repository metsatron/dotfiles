<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
  <!-- User fonts via XDG (resolves to $HOME/.local/share/fonts in sandbox) -->
  <dir prefix="xdg">fonts</dir>
  <!-- Legacy per-user dir (harmless if absent) -->
  <dir>~/.fonts</dir>

  <!-- Host system fonts (via /run/host bridge) -->
  <dir>/run/host/usr/share/fonts</dir>
  <dir>/run/host/usr/local/share/fonts</dir>
</fontconfig>
