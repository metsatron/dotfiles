<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
  <!-- Prefer Nerd symbols whenever SF Mono is requested -->
  <alias>
    <family>SF Mono</family>
    <prefer><family>Symbols Nerd Font Mono</family></prefer>
  </alias>
  <!-- Also cover the Nerd-patched family names just in case -->
  <alias>
    <family>SFMono Nerd Font Mono</family>
    <prefer><family>Symbols Nerd Font Mono</family></prefer>
  </alias>
</fontconfig>